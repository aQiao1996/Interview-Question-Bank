version: '1.0'
name: pipeline-20250808
displayName: 华为云云服务器CICD
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
variables:
  global:
    - SSH_PRIVATE_KEY
stages:
  - name: stage-86dc4dff
    displayName: Node本地构建
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 21.5.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 配置项'
          - '# --------------------------'
          - DIST_LOCAL="./docs/.vitepress/dist"
          - ''
          - '# --------------------------'
          - '# 步骤1：本地构建（生成 dist 目录）'
          - '# --------------------------'
          - echo "===== 开始本地构建 ====="
          - '# 确保使用足够新的 Node.js 版本'
          - node -v
          - npm -v
          - ''
          - npm config set registry https://registry.npmmirror.com/
          - npm install
          - ''
          - '# 尝试构建，如果失败则退出'
          - if ! npm run docs:build; then
          - '    echo "构建失败，请检查错误信息"'
          - '    exit 1'
          - fi
          - ''
          - '# 检查构建产物'
          - if [ ! -d "$DIST_LOCAL" ]; then
          - '    echo "错误：构建后未生成预期目录 $DIST_LOCAL"'
          - '    echo "当前目录内容："'
          - '    ls -la'
          - '    echo ".vitepress 目录内容："'
          - '    ls -la .vitepress'
          - '    exit 1'
          - fi
          - ''
          - echo "验证构建产物："
          - ls -la ./docs/.vitepress/dist
          - ''
          - echo "===== 本地构建完成 ====="
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./docs/.vitepress/dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
  - name: stage-00ecf534
    displayName: 华为云服务器部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 21.5.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 配置项'
          - '# --------------------------'
          - SERVER_IP="113.45.2.169"
          - SERVER_USER="root"
          - PROJECT_DIR="/home/web/interview-question-bank"
          - DIST_LOCAL="./docs/.vitepress/dist"
          - DIST_REMOTE="/home/web/interview-question-bank/docs/.vitepress/dist"
          - SSH_PRIVATE_KEY="$SSH_PRIVATE_KEY"
          - SSH_KEY_PATH="$HOME/.ssh/id_rsa"
          - ''
          - '# --------------------------'
          - '# 步骤1：配置SSH连接'
          - '# --------------------------'
          - echo "配置SSH连接"
          - mkdir -p ~/.ssh
          - echo "$SSH_PRIVATE_KEY" > "$SSH_KEY_PATH"
          - chmod 600 "$SSH_KEY_PATH"
          - chmod 700 ~/.ssh
          - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          - ''
          - '# --------------------------'
          - '# 步骤2：准备远程目录'
          - '# --------------------------'
          - echo "准备远程目录..."
          - ssh -i "$SSH_KEY_PATH" "$SERVER_USER@$SERVER_IP" "
          - '    # 创建目录（如果不存在）'
          - '    mkdir -p \"$DIST_REMOTE\"'
          - '    # 设置权限'
          - '    chmod -R 755 \"/home/web/interview-question-bank/docs\"'
          - '    # 清空目录'
          - '    find \"$DIST_REMOTE\" -mindepth 1 -delete'
          - '"'
          - ''
          - '# --------------------------'
          - '# 步骤3：上传文件'
          - '# --------------------------'
          - echo "开始上传产物..."
          - if ! scp -r -i "$SSH_KEY_PATH" "$DIST_LOCAL"/* "$SERVER_USER@$SERVER_IP:$DIST_REMOTE/"; then
          - '    echo "上传失败！"'
          - '    exit 1'
          - fi
          - ''
          - '# --------------------------'
          - '# 步骤4：服务器端操作'
          - '# --------------------------'
          - echo "服务器端操作..."
          - ssh -i "$SSH_KEY_PATH" "$SERVER_USER@$SERVER_IP" "
          - '    # 更新代码库'
          - '    cd \"$PROJECT_DIR\" && git pull origin main'
          - '    # 设置Nginx权限'
          - '    chown -R www-data:www-data \"$DIST_REMOTE\"'
          - '    # 重载Nginx（静默错误）'
          - '    nginx -s reload || true'
          - '"'
          - echo "部署完成！"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./docs/.vitepress/dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
