version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
stages:
  - name: stage-3b7a1a81
    displayName: 华为云git拉取部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 21.5.0
        commands:
          - '# 设置NPM源，提升安装速度'
          - npm config set registry https://registry.npmmirror.com
          - '# 返回最外层目录'
          - cd ..
          - '# 进入项目目录'
          - cd /home/web/interview-question-bank
          - '# 拉取远程代码'
          - git pull origin main
          - '# 执行编译命令'
          - npm run docs:build
          - '# 重启nginx'
          - nginx -s reload
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
