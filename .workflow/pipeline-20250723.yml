version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
variables:
  global:
    - DEPLOY_KEY
    - DEPLOY_KEY_PUB
stages:
  - name: stage-9721c2a0
    displayName: 华为云git部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 配置项'
          - '# --------------------------'
          - 'SERVER_IP="113.45.2.169"       # 云服务器公网IP'
          - 'SERVER_USER="root"             # SSH登录用户'
          - 'PROJECT_DIR="/home/web/interview-question-bank"  # 服务器项目路径'
          - 'DIST_LOCAL="./dist"            # 本地构建产物目录'
          - 'DIST_REMOTE="/usr/share/nginx/html"  # 服务器目标路径（Nginx 静态目录）'
          - 'SSH_KEY_PATH="$HOME/.ssh/id_rsa"  # 本地 SSH 私钥路径（免密登录）'
          - ''
          - '# --------------------------'
          - '# 步骤1：本地构建（生成 dist 目录）'
          - '# --------------------------'
          - echo "===== 开始本地构建 ====="
          - 'npm install --production  # 仅安装生产依赖（若依赖未变化可跳过）'
          - 'npm run docs:build        # 生成静态文件到 dist 目录'
          - echo "===== 本地构建完成 ====="
          - ''
          - '# --------------------------'
          - '# 步骤2：使用 scp 上传 dist 目录到服务器'
          - '# --------------------------'
          - echo "===== 开始上传产物 ====="
          - '# -r：递归上传目录'
          - '# -i：指定 SSH 私钥（免密登录）'
          - scp -r -i "$SSH_KEY_PATH" "$DIST_LOCAL/*" "$SERVER_USER@$SERVER_IP:$DIST_REMOTE"
          - echo "===== 产物上传完成 ====="
          - ''
          - '# --------------------------'
          - '# 步骤3：服务器端操作（拉取代码 + 重启 Nginx）'
          - '# --------------------------'
          - echo "===== 服务器端操作 ====="
          - '# 拉取最新代码（若有代码更新）'
          - ssh -i "$SSH_KEY_PATH" "$SERVER_USER@$SERVER_IP" "
          - '  cd $PROJECT_DIR && git pull origin main'
          - '"'
          - ''
          - '# 重启 Nginx 使新文件生效'
          - ssh -i "$SSH_KEY_PATH" "$SERVER_USER@$SERVER_IP" "nginx -s reload"
          - echo "===== 部署完成！ ====="
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
