version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
variables:
  global:
    - SERVER_PUBLIC_KEY_CLEAN
stages:
  - name: stage-3b7a1a81
    displayName: 华为云git拉取部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 配置项（建议通过Gitee CI变量设置）'
          - '# --------------------------'
          - 'SERVER_IP="113.45.2.169"       # 云服务器IP'
          - 'SERVER_USER="root"             # SSH登录用户'
          - 'REMOTE_PROJECT_DIR="/home/web/interview-question-bank"  # 云服务器项目路径'
          - 'DIST_REMOTE_DIR="/usr/share/nginx/html"               # Nginx静态文件目录'
          - 'DEPLOY_KEY_SSH_PRIVATE="$SERVER_PUBLIC_KEY_CLEAN"                  # Gitee注入的SSH私钥（需设置为CI变量）'
          - ''
          - '# --------------------------'
          - '# 步骤1：准备SSH连接（CI环境关键）'
          - '# --------------------------'
          - echo "--------------------------"
          - echo "步骤1：配置SSH连接云服务器"
          - echo "--------------------------"
          - ''
          - '# 1. 写入临时SSH配置（避免污染系统文件）'
          - mkdir -p ~/.ssh
          - cat > ~/.ssh/config << EOF
          - Host $SERVER_IP
          - '  HostName $SERVER_IP'
          - '  User $SERVER_USER'
          - '  IdentityFile ~/.ssh/deploy_key'
          - '  StrictHostKeyChecking no'
          - '  UserKnownHostsFile ~/.ssh/known_hosts_ci'
          - EOF
          - ''
          - '# 2. 注入私钥（从Gitee CI变量获取）'
          - echo "$DEPLOY_KEY_SSH_PRIVATE" > ~/.ssh/deploy_key
          - chmod 600 ~/.ssh/deploy_key
          - ''
          - '# 3. 预扫描服务器公钥（避免首次连接提示）'
          - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts_ci
          - chmod 600 ~/.ssh/known_hosts_ci
          - ''
          - '# 4. 测试SSH连接（静默模式）'
          - echo "测试SSH连接..."
          - ssh -o ConnectTimeout=10 $SERVER_USER@$SERVER_IP "echo 'SSH连接成功' && exit 0" || {
          - '  echo "错误：SSH连接失败，请检查密钥配置或服务器状态"'
          - '  exit 1'
          - '}'
          - ''
          - '# --------------------------'
          - '# 步骤2：本地构建项目（CI环境执行）'
          - '# --------------------------'
          - echo "--------------------------"
          - echo "步骤2：拉取代码并构建"
          - echo "--------------------------"
          - ''
          - '# 拉取最新代码（假设当前目录是项目根目录）'
          - git pull origin main || {
          - '  echo "错误：Git拉取失败"'
          - '  exit 1'
          - '}'
          - ''
          - '# 安装生产依赖并构建'
          - npm install --production
          - npm run docs:build || {
          - '  echo "错误：VitePress构建失败"'
          - '  exit 1'
          - '}'
          - ''
          - '# --------------------------'
          - '# 步骤3：上传构建产物到云服务器'
          - '# --------------------------'
          - echo "--------------------------"
          - echo "步骤3：上传dist目录到云服务器"
          - echo "--------------------------"
          - ''
          - '# 使用rsync高效同步（需安装rsync，云服务器需提前安装）'
          - rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" \
          - '  ./dist/ $SERVER_USER@$SERVER_IP:$REMOTE_PROJECT_DIR/dist/ || {'
          - '  echo "错误：文件上传失败"'
          - '  exit 1'
          - '}'
          - ''
          - '# --------------------------'
          - '# 步骤4：远程执行部署操作'
          - '# --------------------------'
          - echo "--------------------------"
          - echo "步骤4：远程重启Nginx并验证"
          - echo "--------------------------"
          - ''
          - '# 远程执行命令：同步dist到Nginx目录并重启'
          - ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_IP "
          - '  # 备份旧文件（可选）'
          - '  [ -d ''$REMOTE_PROJECT_DIR/dist_bak'' ] || mkdir -p ''$REMOTE_PROJECT_DIR/dist_bak'''
          - '  cp -r ''$REMOTE_PROJECT_DIR/dist'' ''$REMOTE_PROJECT_DIR/dist_bak/$(date +%Y%m%d%H%M%S)'''
          - '  '
          - '  # 替换为新构建文件'
          - '  mv ''$REMOTE_PROJECT_DIR/dist/*'' ''$DIST_REMOTE_DIR/'''
          - '  '
          - '  # 验证Nginx配置并重启'
          - '  nginx -t && nginx -s reload'
          - '" || {'
          - '  echo "错误：远程部署命令执行失败"'
          - '  exit 1'
          - '}'
          - ''
          - echo "--------------------------"
          - echo "部署完成！时间：$(date)"
          - echo "--------------------------"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
