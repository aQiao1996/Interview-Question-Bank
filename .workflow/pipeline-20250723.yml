version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
variables:
  global:
    - SERVER_PUBLIC_KEY_CLEAN
stages:
  - name: stage-3b7a1a81
    displayName: 华为云git拉取部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 步骤1：配置SSH连接云服务器（Gitee CI环境）'
          - '# --------------------------'
          - SERVER_IP="113.45.2.169"
          - SERVER_USER="root"
          - 'SSH_PRIVATE_KEY_PATH=~/.ssh/id_rsa  # Gitee部署密钥注入的私钥路径'
          - ''
          - '# 1. 确保.ssh目录存在并设置权限'
          - mkdir -p ~/.ssh
          - chmod 700 ~/.ssh
          - ''
          - '# 2. 动态获取云服务器公钥（避免首次连接警告）'
          - if ! grep -q "$SERVER_IP" ~/.ssh/known_hosts; then
          - '  ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts'
          - '  chmod 600 ~/.ssh/known_hosts'
          - fi
          - ''
          - '# 3. 验证私钥权限（Gitee部署密钥已注入）'
          - if [ ! -f "$SSH_PRIVATE_KEY_PATH" ]; then
          - '  echo "错误：Gitee未注入SSH私钥，请检查部署密钥配置"'
          - '  exit 1'
          - fi
          - chmod 600 "$SSH_PRIVATE_KEY_PATH"
          - ''
          - '# --------------------------'
          - '# 步骤2：通过SSH远程执行云服务器部署操作'
          - '# --------------------------'
          - echo "--------------------------"
          - echo "步骤2：通过SSH连接云服务器并部署"
          - echo "--------------------------"
          - ''
          - ssh -i "$SSH_PRIVATE_KEY_PATH" "$SERVER_USER@$SERVER_IP" "
          - '  set -ex'
          - ''
          - '  # --------------------------'
          - '  # 步骤2.1：进入项目目录（云服务器本地）'
          - '  # --------------------------'
          - '  PROJECT_DIR=\"/home/web/interview-question-bank\"'
          - '  cd \"$PROJECT_DIR\" || { echo \"项目目录不存在！\"; exit 1; }'
          - ''
          - '  # --------------------------'
          - '  # 步骤2.2：拉取Gitee仓库最新代码'
          - '  # --------------------------'
          - '  echo \"拉取Gitee仓库最新代码...\"'
          - '  git pull origin main  # 确保云服务器项目目录是Gitee仓库的克隆'
          - ''
          - '  # --------------------------'
          - '  # 步骤2.3：安装依赖并构建VitePress'
          - '  # --------------------------'
          - '  echo \"安装生产依赖并构建...\"'
          - '  npm install --production'
          - '  npm run docs:build  # 生成dist目录（VitePress默认输出）'
          - ''
          - '  # --------------------------'
          - '  # 步骤2.4：部署构建产物到Nginx目录'
          - '  # --------------------------'
          - '  DIST_SRC=\"./dist\"'
          - '  DIST_DEST=\"/usr/share/nginx/html\"'
          - '  echo \"部署静态文件到Nginx目录...\"'
          - '  cp -r \"$DIST_SRC\"/* \"$DIST_DEST/\"  # 覆盖旧文件（或增量更新）'
          - ''
          - '  # --------------------------'
          - '  # 步骤2.5：检查Nginx配置并重启'
          - '  # --------------------------'
          - '  echo \"检查Nginx配置并重启...\"'
          - '  nginx -t  # 验证配置文件语法'
          - '  nginx -s reload  # 平滑重启（不中断现有连接）'
          - '"'
          - ''
          - echo "--------------------------"
          - echo "部署完成！"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
