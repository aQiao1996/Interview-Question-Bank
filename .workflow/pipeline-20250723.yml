version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
stages:
  - name: stage-3b7a1a81
    displayName: 华为云git拉取部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 步骤1：配置基础环境（CentOS 专用）'
          - '# --------------------------'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# 安装Node.js 20.10.0'
          - if ! command -v node &> /dev/null; then
          - '  echo "安装Node.js 20.10.0..."'
          - '  curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -'
          - '  yum install -y nodejs'
          - fi
          - ''
          - '# 安装VitePress'
          - if ! command -v vitepress &> /dev/null; then
          - '  echo "安装VitePress..."'
          - '  npm install -g vitepress'
          - fi
          - ''
          - '# 安装Nginx'
          - if ! command -v nginx &> /dev/null; then
          - '  echo "安装Nginx..."'
          - '  yum install -y nginx'
          - fi
          - ''
          - '# --------------------------'
          - '# 步骤2：解决SSH Host Key验证'
          - '# --------------------------'
          - SERVER_IP="113.45.2.169"
          - SERVER_USER="root"
          - ''
          - echo "--------------------------"
          - echo "步骤2：修复SSH权限与验证"
          - echo "--------------------------"
          - ''
          - '# 1. 修复.ssh目录权限'
          - mkdir -p ~/.ssh
          - '[ "$(stat -c %a ~/.ssh)" != "700" ] && chmod 700 ~/.ssh'
          - ''
          - '# 2. 提取并清理云服务器公钥（去除注释）'
          - echo "提取云服务器公钥..."
          - SERVER_PUBLIC_KEY_RAW=$(ssh-keyscan -H $SERVER_IP)
          - SERVER_PUBLIC_KEY_CLEAN=$(echo "$SERVER_PUBLIC_KEY_RAW" | grep -v '^#' | awk '{print $2}')
          - ''
          - '# 3. 写入公钥到known_hosts（格式化）'
          - echo "写入公钥到known_hosts..."
          - if [ -z "$SERVER_PUBLIC_KEY_CLEAN" ]; then
          - '  echo "错误：未获取到云服务器公钥！"'
          - '  exit 1'
          - fi
          - KNOWN_HOSTS_ENTRY="$SERVER_IP $(echo "$SERVER_PUBLIC_KEY_CLEAN" | tr '\n' ' ')"
          - echo "$KNOWN_HOSTS_ENTRY" >> ~/.ssh/known_hosts
          - ''
          - '# 4. 修复known_hosts权限'
          - '[ "$(stat -c %a ~/.ssh/known_hosts)" != "600" ] && chmod 600 ~/.ssh/known_hosts'
          - ''
          - '# 5. 验证公钥写入'
          - echo "验证公钥是否写入..."
          - 'grep -q "$KNOWN_HOSTS_ENTRY" ~/.ssh/known_hosts || { '
          - '  echo "错误：公钥未成功写入known_hosts！"'
          - '  exit 1 '
          - '}'
          - ''
          - '# 6. 验证CI私钥注入'
          - echo "验证CI私钥注入..."
          - '[ ! -f ~/.ssh/id_rsa ] && { echo "错误：CI未注入SSH私钥！"; exit 1; }'
          - '[ "$(stat -c %a ~/.ssh/id_rsa)" != "600" ] && chmod 600 ~/.ssh/id_rsa'
          - ''
          - '# 测试SSH连接（详细日志）'
          - echo "测试SSH连接（详细日志）..."
          - ssh -vvv root@$SERVER_IP "echo SSH连接成功"
          - ''
          - '# --------------------------'
          - '# 步骤3：同步云服务器项目到CI环境'
          - '# --------------------------'
          - SERVER_PROJECT_DIR="/home/web/interview-question-bank"
          - CI_WORK_DIR="/root/workspace"
          - echo "同步项目目录：$SERVER_PROJECT_DIR 到 $CI_WORK_DIR..."
          - scp -rq root@$SERVER_IP:$SERVER_PROJECT_DIR $CI_WORK_DIR/
          - cd $CI_WORK_DIR/$SERVER_PROJECT_DIR || { echo "项目目录不存在！"; exit 1; }
          - ''
          - '# --------------------------'
          - '# 步骤4：拉取最新代码'
          - '# --------------------------'
          - echo "拉取远程代码..."
          - git pull origin main
          - ''
          - '# --------------------------'
          - '# 步骤5：安装依赖并构建'
          - '# --------------------------'
          - echo "安装生产依赖..."
          - npm install --production
          - echo "执行VitePress构建..."
          - npm run docs:build
          - ''
          - '# --------------------------'
          - '# 步骤6：部署到Nginx并重启'
          - '# --------------------------'
          - DIST_DEST="/usr/share/nginx/html"
          - echo "部署静态文件到Nginx..."
          - scp -rq $CI_WORK_DIR/$SERVER_PROJECT_DIR/dist/* root@$SERVER_IP:$DIST_DEST/
          - echo "检查Nginx配置..."
          - nginx -t
          - echo "平滑重启Nginx..."
          - nginx -s reload
          - ''
          - echo "部署完成！"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
