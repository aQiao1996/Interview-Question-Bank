version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
variables:
  global:
    - DEPLOY_KEY
    - DEPLOY_KEY_PUB
stages:
  - name: stage-9721c2a0
    displayName: 华为云git部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 配置项（通过Gitee CI变量设置）'
          - '# --------------------------'
          - 'SERVER_IP="113.45.2.169"       # 云服务器公网IP'
          - 'SERVER_PORT="22"               # SSH端口'
          - 'SERVER_USER="root"             # SSH用户'
          - 'REMOTE_PROJECT_DIR="/home/web/interview-question-bank"  # 项目目录'
          - 'DIST_REMOTE_DIR="/usr/share/nginx/html"  # Nginx静态目录（可选，根据构建输出调整）'
          - 'DEPLOY_KEY="$DEPLOY_KEY"       # Gitee注入的SSH私钥（CI变量）'
          - ''
          - '# --------------------------'
          - '# 步骤1：快速配置SSH连接'
          - '# --------------------------'
          - echo "配置SSH连接..."
          - mkdir -p ~/.ssh/ci_deploy && chmod 700 ~/.ssh/ci_deploy
          - echo "$DEPLOY_KEY" > ~/.ssh/ci_deploy/key && chmod 600 ~/.ssh/ci_deploy/key
          - echo -e "Host $SERVER_IP\n  HostName $SERVER_IP\n  User $SERVER_USER\n  Port $SERVER_PORT\n  IdentityFile ~/.ssh/ci_deploy/key\n  StrictHostKeyChecking no" > ~/.ssh/config
          - ''
          - '# --------------------------'
          - '# 步骤2：测试SSH连通性'
          - '# --------------------------'
          - echo "测试SSH连接..."
          - if ! ssh -o ConnectTimeout=10 $SERVER_USER@$SERVER_IP "echo 连接成功"; then
          - '  echo "❌ SSH连接失败，请检查："'
          - '  echo "  1. 服务器SSH服务是否运行（systemctl status sshd）"'
          - '  echo "  2. 防火墙是否放行${SERVER_PORT}端口"'
          - '  echo "  3. Gitee仓库是否已添加服务器公钥到~/.ssh/authorized_keys"'
          - '  exit 1'
          - fi
          - ''
          - '# --------------------------'
          - '# 步骤3：远程执行部署操作'
          - '# --------------------------'
          - echo "开始远程部署..."
          - ssh $SERVER_USER@$SERVER_IP "
          - '  set -ex'
          - ''
          - '  # 进入项目目录并检查'
          - '  cd $REMOTE_PROJECT_DIR || { echo ''❌ 项目目录不存在''; exit 1; }'
          - ''
          - '  # 拉取最新代码'
          - '  git pull origin main || { echo ''❌ git pull失败''; exit 1; }'
          - ''
          - '  # 安装生产依赖（跳过devDependencies）'
          - '  npm install --production || { echo ''❌ npm依赖安装失败''; exit 1; }'
          - ''
          - '  # VitePress构建（根据实际构建命令调整）'
          - '  npm run docs:build || { echo ''❌ 构建失败''; exit 1; }'
          - ''
          - '  # 可选：同步构建产物到Nginx目录（如果构建输出不在默认位置）'
          - '  # cp -r docs/.vitepress/dist/* $DIST_REMOTE_DIR/'
          - ''
          - '  # 验证并重启Nginx'
          - '  nginx -t || { echo ''❌ Nginx配置校验失败''; exit 1; }'
          - '  nginx -s reload && echo ''✅ Nginx重启成功'''
          - '"'
          - ''
          - echo "--------------------------"
          - echo "部署完成！"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
