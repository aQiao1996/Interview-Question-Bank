version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
stages:
  - name: stage-3b7a1a81
    displayName: 华为云git拉取部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 步骤1：配置基础环境（CentOS 专用）'
          - '# --------------------------'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# 安装Node.js 20.10.0'
          - if ! command -v node &> /dev/null; then
          - '  echo "安装Node.js 20.10.0..."'
          - '  curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -'
          - '  yum install -y nodejs'
          - fi
          - ''
          - '# 安装VitePress'
          - if ! command -v vitepress &> /dev/null; then
          - '  echo "安装VitePress..."'
          - '  npm install -g vitepress'
          - fi
          - ''
          - '# 安装Nginx'
          - if ! command -v nginx &> /dev/null; then
          - '  echo "安装Nginx..."'
          - '  yum install -y nginx'
          - fi
          - ''
          - '# --------------------------'
          - '# 步骤2：解决SSH Host Key验证（关键！）'
          - '# --------------------------'
          - SERVER_IP="113.45.2.169"
          - SERVER_USER="root"
          - ''
          - echo "--------------------------"
          - echo "步骤2：修复SSH权限与验证"
          - echo "--------------------------"
          - ''
          - '# 修复.ssh目录权限'
          - mkdir -p ~/.ssh
          - '[ "$(stat -c %a ~/.ssh)" != "700" ] && chmod 700 ~/.ssh'
          - ''
          - '# 修复known_hosts权限并添加公钥'
          - '[ ! -f ~/.ssh/known_hosts ] && touch ~/.ssh/known_hosts'
          - '[ "$(stat -c %a ~/.ssh/known_hosts)" != "600" ] && chmod 600 ~/.ssh/known_hosts'
          - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          - sort -u ~/.ssh/known_hosts -o ~/.ssh/known_hosts
          - ''
          - '# 验证公钥添加成功'
          - SERVER_PUBLIC_KEY=$(ssh-keyscan -H $SERVER_IP | grep -E "ecdsa-sha2-nistp256|rsa-sha2-256|ed25519")
          - '[ ! -z "$SERVER_PUBLIC_KEY" ] || { echo "公钥未添加成功！"; exit 1; }'
          - grep -q "$SERVER_PUBLIC_KEY" ~/.ssh/known_hosts || { echo "公钥未写入known_hosts！"; exit 1; }
          - ''
          - '# 验证CI私钥注入'
          - '[ ! -f ~/.ssh/id_rsa ] && { echo "CI未注入私钥！"; exit 1; }'
          - '[ "$(stat -c %a ~/.ssh/id_rsa)" != "600" ] && chmod 600 ~/.ssh/id_rsa'
          - ''
          - '# 测试SSH连接（详细日志）'
          - echo "测试SSH连接（详细日志）..."
          - ssh -vvv root@$SERVER_IP "echo SSH连接成功"
          - ''
          - '# --------------------------'
          - '# 步骤3：同步云服务器项目到CI环境'
          - '# --------------------------'
          - SERVER_PROJECT_DIR="/home/web/interview-question-bank"
          - CI_WORK_DIR="/root/workspace"
          - echo "同步项目目录：$SERVER_PROJECT_DIR 到 $CI_WORK_DIR..."
          - scp -rq root@$SERVER_IP:$SERVER_PROJECT_DIR $CI_WORK_DIR/
          - cd $CI_WORK_DIR/$SERVER_PROJECT_DIR || { echo "项目目录不存在！"; exit 1; }
          - ''
          - '# --------------------------'
          - '# 步骤4：拉取最新代码'
          - '# --------------------------'
          - echo "拉取远程代码..."
          - git pull origin main
          - ''
          - '# --------------------------'
          - '# 步骤5：安装依赖并构建'
          - '# --------------------------'
          - echo "安装生产依赖..."
          - npm install --production
          - echo "执行VitePress构建..."
          - npm run docs:build
          - ''
          - '# --------------------------'
          - '# 步骤6：部署到Nginx并重启'
          - '# --------------------------'
          - DIST_DEST="/usr/share/nginx/html"
          - echo "部署静态文件到Nginx..."
          - scp -rq $CI_WORK_DIR/$SERVER_PROJECT_DIR/dist/* root@$SERVER_IP:$DIST_DEST/
          - echo "检查Nginx配置..."
          - nginx -t
          - echo "平滑重启Nginx..."
          - nginx -s reload
          - ''
          - echo "部署完成！"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
