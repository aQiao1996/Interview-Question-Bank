version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
variables:
  global:
    - SERVER_PUBLIC_KEY_CLEAN
stages:
  - name: stage-3b7a1a81
    displayName: 华为云git拉取部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '# .gitlab-ci.yml'
          - 'image: node:20.10.0  # 使用预配置的Node.js环境'
          - ''
          - 'stages:'
          - '  - build'
          - '  - deploy'
          - ''
          - 'variables:'
          - '  SSH_PRIVATE_KEY: $SSHPrivate秘钥  # 从Gitee CI/CD变量注入'
          - '  SSH_KNOWN_HOSTS: $SSHKnownHosts    # 从Gitee CI/CD变量注入'
          - '  SERVER_IP: 113.45.2.169'
          - '  SERVER_USER: deployer  # 改用普通用户'
          - '  DIST_DEST: /usr/share/nginx/html'
          - ''
          - 'before_script:'
          - '  # 配置SSH密钥'
          - '  - command -v ssh-agent >/dev/null || ( apt-get update -y && apt-get install openssh-client -y )'
          - '  - eval $(ssh-agent -s)'
          - '  - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id Ed25519'
          - '  - chmod 600 ~/.ssh/id Ed25519'
          - '  - ssh-add ~/.ssh/id Ed25519'
          - '  - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts'
          - '  - chmod 600 ~/.ssh/known_hosts'
          - '  - ssh -oBatchMode=yes -T $SERVER_USER@$SERVER_IP exit  # 验证连接'
          - ''
          - 'build-job:'
          - '  stage: build'
          - '  script:'
          - '    - npm install --production  # 安装生产依赖'
          - '    - npm run docs:build            # 执行VitePress构建'
          - '  artifacts:'
          - '    paths:'
          - '      - dist/  # 将构建产物作为artifacts传递'
          - '    expire_in: 1 hour  # 设置过期时间'
          - ''
          - 'deploy-job:'
          - '  stage: deploy'
          - '  script:'
          - '    - "部署到Nginx并重启"  # 使用更安全的部署方式'
          - '  dependencies:'
          - '    - build-job  # 依赖构建产物'
          - '  only:'
          - '    - master  # 仅在master分支触发部署'
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
