version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
variables:
  global:
    - DEPLOY_KEY
    - DEPLOY_KEY_PUB
stages:
  - name: stage-9721c2a0
    displayName: 华为云git部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 配置项（通过Gitee CI变量设置）'
          - '# --------------------------'
          - 'SERVER_IP="113.45.2.169"       # 云服务器公网IP'
          - 'SERVER_PORT="22"               # SSH端口'
          - 'SERVER_USER="root"             # SSH用户'
          - 'REMOTE_PROJECT_DIR="/home/web/interview-question-bank"  # 项目目录'
          - 'DIST_REMOTE_DIR="/usr/share/nginx/html"  # Nginx静态目录（可选，根据构建输出调整）'
          - 'DEPLOY_KEY="$DEPLOY_KEY"       # Gitee注入的SSH私钥（CI变量）'
          - ''
          - '# --------------------------'
          - '# 步骤1：快速配置SSH连接（优化版）'
          - '# --------------------------'
          - echo "配置SSH连接..."
          - ''
          - '# 创建SSH目录并设置权限'
          - mkdir -p ~/.ssh/ci_deploy
          - chmod 700 ~/.ssh/ci_deploy
          - ''
          - '# 写入私钥（使用printf替代echo，避免换行符问题）'
          - printf "%s\n" "$DEPLOY_KEY" > ~/.ssh/ci_deploy/key
          - chmod 600 ~/.ssh/ci_deploy/key
          - ''
          - '# 验证私钥文件格式（新增调试步骤）'
          - echo "调试：检查私钥文件前5行..."
          - head -n 5 ~/.ssh/ci_deploy/key
          - ''
          - '# 写入SSH配置'
          - cat > ~/.ssh/config << EOF
          - Host $SERVER_IP
          - '  HostName $SERVER_IP'
          - '  User $SERVER_USER'
          - '  Port $SERVER_PORT'
          - '  IdentityFile ~/.ssh/ci_deploy/key'
          - '  StrictHostKeyChecking no'
          - '  IdentitiesOnly yes'
          - EOF
          - ''
          - '# --------------------------'
          - '# 步骤2：测试SSH连通性（增强版）'
          - '# --------------------------'
          - echo "测试SSH连接..."
          - ''
          - '# 尝试连接并捕获详细错误（新增调试）'
          - if ! ssh -v -o ConnectTimeout=10 $SERVER_USER@$SERVER_IP "echo 连接成功"; then
          - '  echo "❌ SSH连接失败，详细错误日志："'
          - '  # 提取SSH连接日志中的关键错误（新增调试）'
          - '  ssh -v -o ConnectTimeout=10 $SERVER_USER@$SERVER_IP "echo 连接成功" 2>&1 | grep -E "error|fail|Permission denied"'
          - '  echo "请检查："'
          - '  echo "  1. 服务器SSH服务是否运行（systemctl status sshd）"'
          - '  echo "  2. 防火墙是否放行${SERVER_PORT}端口（iptables -L 或 firewall-cmd --list-ports）"'
          - '  echo "  3. 私钥是否完整（无截断/多余字符，以-----BEGIN开头和-----END结尾）"'
          - '  echo "  4. 服务器~/.ssh/authorized_keys是否包含Gitee仓库公钥（可通过Gitee仓库「部署公钥」获取）"'
          - '  exit 1'
          - fi
          - ''
          - '# --------------------------'
          - '# 步骤3：远程执行部署操作（优化版）'
          - '# --------------------------'
          - echo "开始远程部署..."
          - ''
          - ssh $SERVER_USER@$SERVER_IP "
          - '  set -ex'
          - ''
          - '  # 进入项目目录并检查'
          - '  cd $REMOTE_PROJECT_DIR || { echo ''❌ 项目目录不存在''; exit 1; }'
          - ''
          - '  # 拉取最新代码（强制覆盖本地修改，根据需求调整）'
          - '  git fetch --prune'
          - '  git reset --hard origin/main || { echo ''❌ git pull失败''; exit 1; }'
          - ''
          - '  # 安装生产依赖（跳过devDependencies）'
          - '  npm install --production || { echo ''❌ npm依赖安装失败''; exit 1; }'
          - ''
          - '  # VitePress构建（根据实际构建命令调整）'
          - '  npm run docs:build || { echo ''❌ 构建失败''; exit 1; }'
          - ''
          - '  # 同步构建产物到Nginx目录（根据实际构建输出路径调整）'
          - '  # 示例：假设构建输出在 docs/.vitepress/dist'
          - '  mkdir -p $DIST_REMOTE_DIR || { echo ''❌ Nginx目录创建失败''; exit 1; }'
          - '  cp -rf docs/.vitepress/dist/* $DIST_REMOTE_DIR/ || { echo ''❌ 同步构建产物失败''; exit 1; }'
          - ''
          - '  # 验证并重启Nginx'
          - '  nginx -t || { echo ''❌ Nginx配置校验失败''; exit 1; }'
          - '  nginx -s reload && echo ''✅ Nginx重启成功'''
          - '"'
          - ''
          - echo "--------------------------"
          - echo "部署完成！"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
