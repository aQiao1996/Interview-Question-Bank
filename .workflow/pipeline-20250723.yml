version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
variables:
  global:
    - SERVER_PUBLIC_KEY_CLEAN
stages:
  - name: stage-3b7a1a81
    displayName: 华为云git拉取部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 步骤1：配置基础环境（CentOS 专用）'
          - '# --------------------------'
          - npm config set registry https://registry.npmmirror.com
          - ''
          - '# 安装Node.js 20.10.0'
          - if ! command -v node &> /dev/null; then
          - '  echo "安装Node.js 20.10.0..."'
          - '  curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -'
          - '  yum install -y nodejs'
          - fi
          - ''
          - '# 安装VitePress'
          - if ! command -v vitepress &> /dev/null; then
          - '  echo "安装VitePress..."'
          - '  npm install -g vitepress'
          - fi
          - ''
          - '# 安装Nginx'
          - if ! command -v nginx &> /dev/null; then
          - '  echo "安装Nginx..."'
          - '  yum install -y nginx'
          - fi
          - ''
          - '# --------------------------'
          - '# 步骤2：配置SSH（使用Gitee预注入的公钥）'
          - '# --------------------------'
          - '# 假设Gitee已将公钥注入到环境变量 `GITEE_SSH_PUBLIC_KEY`'
          - '# （需在Gitee CI设置中配置该变量）'
          - if [ -z "$GITEE_SSH_PUBLIC_KEY" ]; then
          - '  echo "错误：Gitee未注入SSH公钥！"'
          - '  exit 1'
          - fi
          - ''
          - '# 1. 创建.ssh目录并设置权限'
          - mkdir -p ~/.ssh
          - chmod 700 ~/.ssh
          - ''
          - '# 2. 写入公钥到known_hosts（使用Gitee的公钥）'
          - echo "写入Gitee SSH公钥到known_hosts..."
          - echo "$GITEE_SSH_PUBLIC_KEY" >> ~/.ssh/known_hosts
          - chmod 600 ~/.ssh/known_hosts
          - ''
          - '# 3. 验证私钥注入（需在Gitee CI中配置私钥环境变量 `GITEE_SSH_PRIVATE_KEY`）'
          - if [ -z "$GITEE_SSH_PRIVATE_KEY" ]; then
          - '  echo "错误：Gitee未注入SSH私钥！"'
          - '  exit 1'
          - fi
          - echo "$GITEE_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          - chmod 600 ~/.ssh/id_rsa
          - ''
          - '# 4. 测试SSH连接（使用Gitee的SSH地址，如git@gitee.com）'
          - echo "测试SSH连接..."
          - ssh -vvv -o StrictHostKeyChecking=no git@gitee.com "echo SSH连接成功"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
