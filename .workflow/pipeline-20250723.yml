version: '1.0'
name: pipeline-20250723
displayName: pipeline-20250723
triggers:
  trigger: manual
  push:
    branches:
      precise:
        - main
variables:
  global:
    - DEPLOY_KEY
    - DEPLOY_KEY_PUB
stages:
  - name: stage-9721c2a0
    displayName: 华为云git部署
    strategy: naturally
    trigger: auto
    executor:
      - yangyunqiao
    steps:
      - step: build@nodejs
        name: build_nodejs
        displayName: Nodejs 构建
        nodeVersion: 20.10.0
        commands:
          - '#!/bin/bash'
          - set -ex
          - ''
          - '# --------------------------'
          - '# 配置项（通过Gitee CI变量设置）'
          - '# --------------------------'
          - 'SERVER_IP="113.45.2.169"       # 云服务器公网IP'
          - 'SERVER_USER="root"             # SSH登录用户'
          - 'PROJECT_DIR="/home/web/interview-question-bank"  # 项目路径'
          - 'DIST_DIR="/usr/share/nginx/html"               # Nginx静态文件目录'
          - 'DEPLOY_KEY="$DEPLOY_KEY"       # Gitee注入的SSH私钥（CI变量）'
          - ''
          - '# --------------------------'
          - '# 步骤1：配置SSH连接'
          - '# --------------------------'
          - echo "--------------------------"
          - echo "配置SSH连接"
          - echo "--------------------------"
          - ''
          - '# 创建临时SSH目录并写入私钥'
          - mkdir -p ~/.ssh
          - echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
          - chmod 600 ~/.ssh/id_rsa
          - ''
          - '# 添加服务器指纹到known_hosts'
          - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          - ''
          - '# --------------------------'
          - '# 步骤2：执行部署操作'
          - '# --------------------------'
          - echo "--------------------------"
          - echo "开始部署"
          - echo "--------------------------"
          - ''
          - ssh $SERVER_USER@$SERVER_IP << EOF
          - '  set -ex'
          - ''
          - '  # 进入项目目录'
          - '  cd $PROJECT_DIR'
          - ''
          - '  # 拉取最新代码'
          - '  git pull origin main'
          - ''
          - '  # 安装依赖并构建'
          - '  npm install --production'
          - '  npm run docs:build'
          - ''
          - '  # 重启Nginx'
          - '  nginx -s reload'
          - EOF
          - ''
          - echo "--------------------------"
          - echo "部署完成！"
          - echo "--------------------------"
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./dist
        caches:
          - ~/.npm
          - ~/.yarn
        notify: []
        strategy:
          retry: '0'
